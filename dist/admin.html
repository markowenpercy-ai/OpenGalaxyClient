<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenGalaxy Server Stats</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
.container { max-width: 800px; width: 100%; }
h1 { text-align: center; color: #00ff44; margin-bottom: 30px; font-size: 28px; letter-spacing: 2px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.card { background: #111; border: 1px solid #333; border-radius: 10px; padding: 20px; }
.card h3 { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.card .val { color: #0f0; font-size: 22px; font-weight: bold; }
.card .val.off { color: #f44; }
.card.full { grid-column: 1 / -1; }
.status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
.status-dot.on { background: #0f0; box-shadow: 0 0 6px #0f0; }
.status-dot.off { background: #f44; box-shadow: 0 0 6px #f44; }
.footer { margin-top: 30px; text-align: center; color: #444; font-size: 12px; }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<h1>Server Stats</h1>
<div class="grid" id="stats">
<div class="card full" style="text-align:center;border-color:#00ff4433">
<span class="status-dot" id="backend-dot"></span><span id="backend-status">Checking...</span>
</div>
<div class="card"><h3>Online Players</h3><div class="val" id="online">-</div></div>
<div class="card"><h3>Game IP</h3><div class="val" id="gameip">-</div></div>
<div class="card"><h3>Game Port</h3><div class="val">5051</div></div>
<div class="card"><h3>Backend URL</h3><div class="val" style="font-size:14px" id="backend">-</div></div>
<div class="card"><h3>Web Port</h3><div class="val">8080</div></div>
<div class="card"><h3>Server Version</h3><div class="val" style="font-size:14px">v2022.2</div></div>
<div class="card"><h3>Uptime</h3><div class="val" id="uptime">-</div></div>
</div>
<div class="footer">OpenGalaxy Server Stats</div>
</div>
<script>
var startTime = Date.now();

function refresh() {
var xhr = new XMLHttpRequest();
xhr.open('GET', '/api/status', true);
xhr.onload = function() {
  if (xhr.status == 200) {
    var d = JSON.parse(xhr.responseText);
    var alive = d.backendAlive;
    document.getElementById('backend-dot').className = 'status-dot ' + (alive ? 'on' : 'off');
    document.getElementById('backend-status').textContent = alive ? 'Online' : 'Offline';
    document.getElementById('backend-status').style.color = alive ? '#0f0' : '#f44';
    document.getElementById('online').textContent = d.onlinePlayers || 0;
    document.getElementById('gameip').textContent = d.gameIp || '-';
    document.getElementById('backend').textContent = d.backendUrl || '-';
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    var h = Math.floor(elapsed / 3600);
    var m = Math.floor((elapsed % 3600) / 60);
    var s = elapsed % 60;
    document.getElementById('uptime').textContent = h + 'h ' + m + 'm ' + s + 's';
  }
};
xhr.send();
}
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
